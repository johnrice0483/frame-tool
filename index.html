<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghép Ảnh Khung</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f2;
    --surface: #ffffff;
    --border: #e8e6e2;
    --text-primary: #1a1917;
    --text-secondary: #7a7870;
    --accent: #2a2825;
    --accent-hover: #454340;
    --btn-download: #1a1917;
    --radius: 16px;
    --shadow: 0 2px 24px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 48px rgba(0,0,0,0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* ─── LANDING ─── */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px 48px;
    gap: 0;
    transition: opacity .4s ease;
  }

  .landing-logo {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(24px, 5vw, 36px);
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .landing-sub {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 0.6px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  /* Landing frame preview */
  .landing-frame-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 1/1;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    background: #e8e5e0;
  }

  #landingCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Upload overlay button centered inside frame */
  .upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .upload-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.90);
    border: 2px dashed rgba(42,40,37,0.22);
    border-radius: 20px;
    padding: 28px 36px;
    cursor: pointer;
    pointer-events: all;
    transition: background .2s, border-color .2s, transform .15s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .upload-btn:hover {
    background: rgba(255,255,255,0.98);
    border-color: rgba(42,40,37,0.45);
    transform: scale(1.03);
  }
  .upload-btn:active { transform: scale(0.98); }

  .upload-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(42,40,37,0.3);
  }

  .upload-btn-label {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
  }

  .upload-btn-hint {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .landing-hint {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); flex-shrink: 0; }

  /* ─── EDITOR ─── */
  #editor {
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 28px 16px 48px;
    gap: 0;
  }

  .editor-header {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .editor-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
  }

  .btn-reset {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* Editor canvas wrapper */
  .canvas-wrapper {
    position: relative;
    width: 100%;
    max-width: 520px;
    aspect-ratio: 1/1;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    background: #e8e5e0;
    cursor: grab;
  }
  .canvas-wrapper:active { cursor: grabbing; }

  #canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ─── CONTROLS ─── */
  .controls {
    width: 100%;
    max-width: 520px;
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px 20px;
    box-shadow: var(--shadow);
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .control-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
    white-space: nowrap;
    min-width: 60px;
  }

  .slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid #fff;
    box-shadow: 0 1px 6px rgba(0,0,0,0.2);
    transition: transform .15s;
  }
  .slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .slider::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid #fff;
    box-shadow: 0 1px 6px rgba(0,0,0,0.2);
    cursor: pointer;
  }

  .zoom-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    min-width: 38px;
    text-align: right;
  }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .control-hint {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .hint-item { display: flex; align-items: center; gap: 5px; }

  /* ─── DOWNLOAD BTN ─── */
  .btn-download {
    width: 100%;
    max-width: 520px;
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--btn-download);
    color: #fff;
    border: none;
    border-radius: 56px;
    padding: 18px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(26,25,23,0.2);
  }
  .btn-download:hover { background: #333; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,25,23,0.28); }
  .btn-download:active { transform: translateY(0); }

  /* ─── LOADING OVERLAY ─── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(245,244,242,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .loading-overlay.visible { opacity: 1; pointer-events: all; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1917;
    color: #fff;
    font-size: 14px;
    padding: 12px 24px;
    border-radius: 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #fileInput { display: none; }

  @media (max-width: 400px) {
    .editor-header { margin-bottom: 14px; }
    .controls { padding: 14px 16px 16px; }
    .upload-btn { padding: 22px 26px; }
  }
</style>
</head>
<body>

<!-- ─── LANDING ─── -->
<div id="landing">
  <p class="landing-logo">Frame Studio</p>
  <p class="landing-sub">Ghép ảnh khung chuyên nghiệp</p>

  <div class="landing-frame-wrap">
    <canvas id="landingCanvas"></canvas>
    <!-- Upload button centered inside the frame preview -->
    <div class="upload-overlay" id="uploadOverlay">
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </div>
        <span class="upload-btn-label">Tải ảnh lên</span>
        <span class="upload-btn-hint">PNG · JPG · WEBP</span>
      </button>
    </div>
    <div class="loading-overlay" id="landingLoadingOverlay"><div class="spinner"></div></div>
  </div>

  <p class="landing-hint">
    <span>Xử lý ngay trên trình duyệt</span>
    <span class="dot"></span>
    <span>Không lưu dữ liệu</span>
    <span class="dot"></span>
    <span>Xuất 1080×1080px</span>
  </p>
</div>

<!-- ─── EDITOR ─── -->
<div id="editor">
  <div class="editor-header">
    <span class="editor-title">Chỉnh ảnh</span>
    <button class="btn-reset" onclick="resetApp()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
      </svg>
      Chọn ảnh khác
    </button>
  </div>

  <div class="canvas-wrapper" id="canvasWrapper">
    <canvas id="canvas"></canvas>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  </div>

  <div class="controls">
    <div class="control-row">
      <span class="control-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        Thu phóng
      </span>
      <input type="range" id="zoomSlider" class="slider" min="80" max="120" value="100" oninput="onZoomSlider(this.value)">
      <span class="zoom-value" id="zoomValue">100%</span>
    </div>
    <div class="divider"></div>
    <div class="control-hint">
      <span class="hint-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
        Kéo thả để di chuyển ảnh
      </span>
      <span class="hint-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Frame luôn ở lớp trên cùng
      </span>
    </div>
  </div>

  <button class="btn-download" onclick="downloadImage()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    HOÀN THÀNH &amp; TẢI VỀ
  </button>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(this)">

<script>
// ─── CONSTANTS ───
const C           = 520;    // editor canvas size in px
const EXPORT_SIZE = 1080;
const FRAME_SRC   = 'frame.png';
const ZOOM_MIN    = 0.80;   // 80%  relative to cover-fit baseScale
const ZOOM_MAX    = 1.20;   // 120% relative to cover-fit baseScale

// ─── EDITOR CANVAS ───
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = C;
canvas.height = C;

// ─── LANDING CANVAS ───
const lCanvas = document.getElementById('landingCanvas');
const lCtx    = lCanvas.getContext('2d');

function sizeLandingCanvas() {
  const rect = lCanvas.parentElement.getBoundingClientRect();
  const px   = Math.round(rect.width) || 480;
  if (lCanvas.width !== px) {
    lCanvas.width  = px;
    lCanvas.height = px;
  }
}

// ─── STATE ───
let userImg  = null;
let frameImg = null;
// baseScale: cover-fit ratio so image fills canvas without gaps
// zoom: user multiplier in [ZOOM_MIN, ZOOM_MAX]
let imgState = { x: 0, y: 0, baseScale: 1, zoom: 1 };
let drag     = { active: false, startX: 0, startY: 0, imgX: 0, imgY: 0 };

// ─── PRELOAD FRAME ───
(function preloadFrame() {
  const img       = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    frameImg = img;
    drawLanding();   // render frame on landing canvas right away
  };
  img.onerror = () => { frameImg = null; };
  img.src = FRAME_SRC;
})();

// Draw frame preview on the landing page (no user image)
function drawLanding() {
  sizeLandingCanvas();
  lCtx.clearRect(0, 0, lCanvas.width, lCanvas.height);
  if (frameImg) {
    lCtx.drawImage(frameImg, 0, 0, lCanvas.width, lCanvas.height);
  }
}

// ─── FILE SELECT ───
function handleFileSelect(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  if (!file.type.startsWith('image/')) { showToast('Vui lòng chọn file ảnh hợp lệ.'); return; }

  showLandingLoading(true);
  const reader = new FileReader();
  reader.onload = e => {
    const img  = new Image();
    img.onload = () => {
      userImg = img;
      initImageState();
      showEditor();
      showLandingLoading(false);
    };
    img.onerror = () => { showToast('Không thể đọc ảnh. Hãy thử lại.'); showLandingLoading(false); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';   // allow re-selecting the same file
}

// ─── INIT IMAGE STATE ───
// Cover-fit: scale = max(C/w, C/h) ensures every pixel of the canvas is covered.
// Portrait  → width fits exactly, height overflows → no horizontal gap
// Landscape → height fits exactly, width overflows  → no vertical gap
// Square    → both fit exactly
function initImageState() {
  const baseScale    = Math.max(C / userImg.width, C / userImg.height);
  imgState.baseScale = baseScale;
  imgState.zoom      = 1;   // 100% = cover-fit

  // Center image on canvas
  const w = userImg.width  * baseScale;
  const h = userImg.height * baseScale;
  imgState.x = (C - w) / 2;
  imgState.y = (C - h) / 2;

  // Reset slider to midpoint (100 → zoom=1.00)
  document.getElementById('zoomSlider').value = 100;
  document.getElementById('zoomValue').textContent = '100%';

  draw();
}

// ─── DRAW (editor) ───
function draw() {
  ctx.clearRect(0, 0, C, C);

  if (userImg) {
    const sc = imgState.baseScale * imgState.zoom;
    ctx.drawImage(userImg, imgState.x, imgState.y, userImg.width * sc, userImg.height * sc);
  }

  if (frameImg) {
    ctx.drawImage(frameImg, 0, 0, C, C);
  }
}

// ─── ZOOM ───
// Slider: integer 80–120. Maps linearly to zoom 0.80–1.20.
function onZoomSlider(val) {
  const pct     = parseInt(val);
  const newZoom = pct / 100;

  document.getElementById('zoomValue').textContent = pct + '%';

  const oldSc = imgState.baseScale * imgState.zoom;
  imgState.zoom = newZoom;
  const newSc = imgState.baseScale * imgState.zoom;

  // Zoom anchored to canvas center so the view doesn't jump
  const cx = C / 2, cy = C / 2;
  imgState.x = cx - (cx - imgState.x) * (newSc / oldSc);
  imgState.y = cy - (cy - imgState.y) * (newSc / oldSc);

  clampPosition();
  draw();
}

// ─── CLAMP — image must fully cover the canvas at all times ───
// Because baseScale is cover-fit and zoom >= ZOOM_MIN (0.80), the scaled image
// is always >= canvas on its SMALLER axis. On its LARGER axis it always overflows.
// Constraint: none of the four edges may cross inside the canvas boundary.
//   x <= 0              left edge at or left of left side
//   x + imgW >= C       right edge at or right of right side
//   y <= 0              top edge at or above top
//   y + imgH >= C       bottom edge at or below bottom
function clampPosition() {
  if (!userImg) return;
  const sc = imgState.baseScale * imgState.zoom;
  const w  = userImg.width  * sc;
  const h  = userImg.height * sc;

  imgState.x = Math.min(imgState.x, 0);
  imgState.x = Math.max(imgState.x, C - w);
  imgState.y = Math.min(imgState.y, 0);
  imgState.y = Math.max(imgState.y, C - h);
}

// ─── DRAG — MOUSE ───
canvas.addEventListener('mousedown', e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => { if (drag.active) moveDrag(e.clientX, e.clientY); });
window.addEventListener('mouseup',   () => { drag.active = false; });

// ─── DRAG — TOUCH ───
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && drag.active) moveDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchend', () => { drag.active = false; });

function clientToCanvas(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (cx - rect.left) * (C / rect.width),
    y: (cy - rect.top)  * (C / rect.height)
  };
}

function startDrag(cx, cy) {
  const pt    = clientToCanvas(cx, cy);
  drag.active = true;
  drag.startX = pt.x;
  drag.startY = pt.y;
  drag.imgX   = imgState.x;
  drag.imgY   = imgState.y;
}

function moveDrag(cx, cy) {
  const pt   = clientToCanvas(cx, cy);
  imgState.x = drag.imgX + (pt.x - drag.startX);
  imgState.y = drag.imgY + (pt.y - drag.startY);
  clampPosition();
  draw();
}

// ─── DOWNLOAD ───
function downloadImage() {
  if (!userImg) { showToast('Chưa có ảnh để xuất.'); return; }

  showToast('Đang tạo ảnh xuất…');

  const offCanvas  = document.createElement('canvas');
  offCanvas.width  = EXPORT_SIZE;
  offCanvas.height = EXPORT_SIZE;
  const offCtx = offCanvas.getContext('2d');

  // Upscale factor: export / display
  const ratio = EXPORT_SIZE / C;

  // Reproduce the exact same layout at export resolution
  const sc = imgState.baseScale * imgState.zoom * ratio;
  offCtx.drawImage(
    userImg,
    imgState.x * ratio,
    imgState.y * ratio,
    userImg.width  * sc,
    userImg.height * sc
  );

  const drawFrameAndSave = (fImage) => {
    if (fImage) offCtx.drawImage(fImage, 0, 0, EXPORT_SIZE, EXPORT_SIZE);
    try {
      const link    = document.createElement('a');
      link.download = 'anh-ghep-khung.png';
      link.href     = offCanvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('✓ Ảnh đã được tải về!');
    } catch (err) {
      showToast('Lỗi: canvas bị tainted. Hãy dùng local server (Live Server / npx serve).');
      console.error('Export error:', err);
    }
  };

  if (frameImg) {
    drawFrameAndSave(frameImg);
  } else {
    const fImg       = new Image();
    fImg.crossOrigin = 'anonymous';
    fImg.onload  = () => drawFrameAndSave(fImg);
    fImg.onerror = () => { showToast('Không tìm thấy frame.png — xuất ảnh không có khung.'); drawFrameAndSave(null); };
    fImg.src = FRAME_SRC + '?t=' + Date.now();
  }
}

// ─── UI HELPERS ───
function showEditor() {
  document.getElementById('landing').style.display = 'none';
  const ed = document.getElementById('editor');
  ed.style.display  = 'flex';
  ed.style.opacity  = 0;
  requestAnimationFrame(() => {
    ed.style.transition = 'opacity .4s ease';
    ed.style.opacity    = 1;
  });
}

function resetApp() {
  userImg = null;
  ctx.clearRect(0, 0, C, C);
  document.getElementById('editor').style.display = 'none';

  const landing = document.getElementById('landing');
  landing.style.display = 'flex';
  landing.style.opacity = 1;

  document.getElementById('uploadOverlay').style.display = 'flex';
  drawLanding();
}

function showLandingLoading(on) {
  document.getElementById('landingLoadingOverlay').classList.toggle('visible', on);
  document.getElementById('uploadOverlay').style.display = on ? 'none' : 'flex';
}

function showLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('visible', on);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Render landing frame once layout is complete
window.addEventListener('load', drawLanding);
</script>
</body>
</html>
